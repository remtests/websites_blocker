<!DOCTYPE html>
<html>
<head>
  <title>Popup</title>

  <style>
    body {
      width: 200px;
      padding: 20px;
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #4a90e2;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #3b7ac0;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      background: #e8e8ea;
      padding: 8px;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      text-decoration: none;
      color: #4a90e2;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    a:hover {
      background: #dce9f9;
    }
  </style>

</head>
<body>
  <button id="toggleBtn">OFF</button>
  <p id="status">ON</p>
  <a href="#" id="optionsLink">Manage list</a>
  <script src="popup.js"></script>
</body>
</html>
